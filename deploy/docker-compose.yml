# IdeaL server — run on your existing VM with:  ./scripts/deploy.sh
# (equivalently: docker compose -f deploy/docker-compose.yml up -d --build)
services:
  ideal:
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: ideal-server:latest
    container_name: ideal
    env_file:
      - ../.env
    environment:
      # SQLite lives on the mounted volume so it survives restarts/rebuilds.
      IDEAL_DB_PATH: /data/ideal.sqlite
    ports:
      - "${IDEAL_PORT:-8000}:8000"
    volumes:
      - ../data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
